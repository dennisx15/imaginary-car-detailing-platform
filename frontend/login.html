<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>

    <h1>Login</h1>

    <form id="login-form">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>
    </form>

    <button id="create-account-button">
        Create Account
    </button>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
