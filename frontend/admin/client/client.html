<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Clients</title>
    <link rel="stylesheet" href="../../assets/css/admin-shared.css">
</head>
<body class="admin-body">

    <header class="admin-navbar">
        <div class="nav-left">
            <select id="subject-selector" class="nav-dropdown" onchange="switchSubject(this.value)">
                <option value="client" selected>Client</option>
                <option value="employee">Employee</option>
                <option value="business">Business</option>
            </select>
        </div>
        <nav class="nav-right sub-subject-links">
            <a href="client.html" class="tab-link active">Profiles</a>
            <a href="subsubjects/history.html" class="tab-link">Booking History</a>
        </nav>
    </header>

    <main class="admin-content">
        <h1>Client Profiles Directory</h1>
        <p>Review database records for registered users, verification statuses, and contact data.</p>
    </main>

    <script>
        function switchSubject(subject) {
            if (subject === 'client') window.location.href = 'client.html';
            else if (subject === 'employee') window.location.href = '../employee/employee.html';
            else if (subject === 'business') window.location.href = '../business/business.html';
        }
    </script>
</body>
</html>
