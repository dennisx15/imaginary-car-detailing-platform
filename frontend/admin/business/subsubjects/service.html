<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business - Services</title>
    <link rel="stylesheet" href="../../../assets/css/admin-shared.css">
</head>
<body class="admin-body">

    <header class="admin-navbar">
        <div class="nav-left">
            <select id="subject-selector" class="nav-dropdown" onchange="switchSubject(this.value)">
                <option value="client">Client</option>
                <option value="employee">Employee</option>
                <option value="business" selected>Business</option>
            </select>
        </div>
        <nav class="nav-right sub-subject-links">
            <a href="../business.html" class="tab-link">Overview</a>
            <a href="service.html" class="tab-link active">Services</a>
            <a href="statistics.html" class="tab-link">Statistics</a>
        </nav>
    </header>

    <main class="admin-content">
        <h1>Service Configurations</h1>
        <p>Manage your car washing packages, adjust tiers, and update pricing models here.</p>
    </main>

    <script>
        function switchSubject(subject) {
            if (subject === 'client') window.location.href = '../../client/client.html';
            else if (subject === 'employee') window.location.href = '../../employee/employee.html';
            else if (subject === 'business') window.location.href = '../business.html';
        }
    </script>
</body>
</html>
