<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Apex Detailer</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="login-page-body">

    <div class="login-container">
        <div class="login-header">
            <div class="brand-badge"> Apex Detailers </div>
            <h1>Welcome Back</h1>
            <p>Enter credentials to access your detail dashboard</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Email Address" 
                    required
                >
            </div>

            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Password" 
                    required
                >
            </div>

            <button type="submit" class="submit-btn">
                Sign In
            </button>
        </form>

        <div class="divider">or</div>

        <button id="create-account-button" class="secondary-btn">
            Create an Account
        </button>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/login.js"></script>

</body>
</html>
