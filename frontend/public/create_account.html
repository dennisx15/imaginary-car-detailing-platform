<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Apex Detailers </title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="login-page-body">

    <div class="login-container">
        <div class="login-header">
            <div class="brand-badge"> Apex Detailers</div>
            <h1>Get Started</h1>
            <p>Create a profile to book your luxury detailing slot</p>
        </div>

        <form id="create-account-form">
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Email Address" 
                    required
                >
            </div>

            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Choose a Strong Password" 
                    required
                >
            </div>

            <button type="submit" class="submit-btn">
                Register Account
            </button>
        </form>

        <div class="divider">or</div>

        <button id="back-to-login-button" class="secondary-btn" onclick="window.location.href='login.html'">
            Back to Login
        </button>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/create_account.js"></script>

</body>
</html>
