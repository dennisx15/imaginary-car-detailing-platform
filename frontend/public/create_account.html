<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
</head>

<body>

    <h1>Create Account</h1>

    <form id="create-account-form">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/create_account.js"></script>

</body>

</html>
