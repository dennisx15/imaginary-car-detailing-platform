<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apex Auto Detailing</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

 <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="create_appointment.html">Book Appointment</a>
    <a href="my_appointments.html">My Appointments</a>
</nav>

    <h1>Apex Auto Detailing</h1>

    <h2>Book Appointment</h2>


    <form id="appointment-form">

        <input
            type="text"
            id="name"
            placeholder="Customer Name"
            required
        >

<label for="service">Choose a Detailing Service:</label>
<select id="service" name="service" required>
    <option value="" disabled selected>-- Select a Package --</option>
    <option value="Executive Exterior Wash">Executive Exterior Wash ($75)</option>
    <option value="Bronze Express Wash">Bronze Express Wash ($50)</option>
    <option value="Silver Tier Interior">Silver Tier Interior ($75)</option>
    <option value="Gold Tier">Gold Tier ($150)</option>
</select>
        <input
            type="text"
            id="phone_number"
            placeholder="Phone Number"
            required
        >
        <input
            type="text"
            id="notes"
            placeholder="Notes"
        >

        <input
        type="date"
        id="appointment_time"
        required
        >

        <button type="submit">
            Submit
        </button>


    </form>

    <h2>Available Slots</h2>
    
    <div id="slots-container"></div>

    <p id="response-message"></p>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/create_appointment.js"></script>

</body>

</html>
