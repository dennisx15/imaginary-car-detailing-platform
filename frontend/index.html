<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apex Auto Detailing</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Apex Auto Detailing</h1>

    <h2>Book Appointment</h2>

    <form id="appointment-form">

        <input
            type="text"
            id="name"
            placeholder="Customer Name"
            required
        >

        <input
            type="text"
            id="service"
            placeholder="Service"
            required
        >
        <input
            type="text"
            id="phone_number"
            placeholder="Phone Number"
            required
        >
        <input
            type="text"
            id="notes"
            placeholder="Notes"
        >

        <button type="submit">
            Submit
        </button>

    </form>

    <h1>Appointments</h1>

    <div id="appointments-container"></div>

    <p id="response-message"></p>

    <script src="js/app.js"></script>

</body>

</html>
